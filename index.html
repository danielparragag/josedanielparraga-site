<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>José Daniel Parraga</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#0a0a0a;
color:white;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
}

h1{
font-size:60px;
font-weight:500;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
font-size:20px;
margin-bottom:40px;
}

.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:14px 26px;
font-size:16px;
border-radius:30px;
border:none;
cursor:pointer;
}

.legis{
background:#cfe3ff;
color:#0a0a0a;
}

.lawyerist{
background:#e6c84f;
color:#000;
}

</style>

</head>

<body>

<section class="hero">

<h1>José Daniel Parraga</h1>

<div class="subtitle">
Abogado · Litigio Estratégico · Análisis Institucional
</div>

<div class="buttons">

<button class="legis">
Legisolve Abogados
</button>

<button class="lawyerist">
The Lawyerist
</button>

</div>

</section>

</body>
</html>
